name: Build

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

permissions:
  contents: read
  actions: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-26.04, ubuntu-26.04-arm, macos-26]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            accept-flake-config = true
            auto-optimise-store = ${{ startsWith(matrix.os, 'macos-') && 'false' || 'true' }}
            sandbox = ${{ startsWith(matrix.os, 'macos-') && 'relaxed' || 'true' }}
            keep-env-derivations = true
            keep-outputs = true
      - name: Setup cachix
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: warashi
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: false # PR でも push して、 main にマージされたときにキャッシュが使えるようにする
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ matrix.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ matrix.os }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-${{ matrix.os }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          show-progress: false
      - run: ./.github/workflows/build-all.sh
      - name: Check disk usage
        if: always()
        run: df -h
